<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./assets/images/logo/logo.png">
    <title>Smart Clinic - Select Role</title>
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content landing-content">
                <section class="role-panel" aria-labelledby="role-title">
                    <p class="eyebrow">Smart Clinic Management System</p>
                    <h2 id="role-title">Select your role</h2>
                    <p class="role-copy">Choose how you want to access the clinic portal.</p>

                    <div class="role-actions">
                        <button type="button" id="adminLogin" class="dashboard-btn">Admin</button>
                        <button type="button" id="doctorLogin" class="dashboard-btn">Doctor</button>
                        <button type="button" id="patientRole" class="dashboard-btn" onclick="selectRole('patient')">Patient</button>
                    </div>
                </section>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="./js/services/index.js" defer></script>
</body>

</html>
